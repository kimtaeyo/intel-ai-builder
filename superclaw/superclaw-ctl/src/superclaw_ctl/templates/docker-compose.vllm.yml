# Standalone vLLM-only compose template.
# Generated by superclaw-ctl init. Edit as needed.
#
# Start: docker compose -f docker-compose.vllm.yml up -d
# Stop:  docker compose -f docker-compose.vllm.yml down

services:
  vllm:
    container_name: qwen-vllm
    image: ${VLLM_IMAGE:-intel/llm-scaler-vllm:0.14.0-b8.3}
    ipc: host
    privileged: true
    cap_drop:
      - NET_RAW
    shm_size: "32gb"
    devices:
      - /dev/dri:/dev/dri
    ports:
      - "${ROUTER_PORT:-8080}:${ROUTER_PORT:-8080}"
    volumes:
      - ${LOCAL_MODELS_DIR:-/models}:/llm/models
      - ${LOCAL_LOGS_DIR:-/home/user/qwen-vllm-logs}:/llm/logs
    environment:
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1}
      VLLM_API_KEY: ${VLLM_API_KEY:?VLLM_API_KEY must be set}
      VLLM_ROUTER_VERSION: ${VLLM_ROUTER_VERSION:-0.1.14}
      ROUTER_HOST: ${ROUTER_HOST:-0.0.0.0}
      ROUTER_PORT: ${ROUTER_PORT:-8080}
      VLLM_BACKEND_READY_TIMEOUT_SECONDS: ${VLLM_BACKEND_READY_TIMEOUT_SECONDS:-1800}
      SUPERCLAW_WATCHDOG_ENABLED:                 ${SUPERCLAW_WATCHDOG_ENABLED:-true}
      SUPERCLAW_WATCHDOG_INTERVAL_S:              ${SUPERCLAW_WATCHDOG_INTERVAL_S:-60}
      SUPERCLAW_WATCHDOG_FAILURES:                ${SUPERCLAW_WATCHDOG_FAILURES:-3}
      SUPERCLAW_WATCHDOG_CANARY_EXPECTED:         ${SUPERCLAW_WATCHDOG_CANARY_EXPECTED:-Hello}
      SUPERCLAW_WATCHDOG_MAX_RESTARTS:            ${SUPERCLAW_WATCHDOG_MAX_RESTARTS:-5}
      SUPERCLAW_WATCHDOG_RESTART_WINDOW_MINUTES:  ${SUPERCLAW_WATCHDOG_RESTART_WINDOW_MINUTES:-60}
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        mkdir -p /llm/logs
        exec > >(tee -a /llm/logs/init.log) 2>&1
        source /opt/intel/oneapi/setvars.sh --force > /dev/null 2>&1

        export http_proxy="$${HTTP_PROXY:-}"
        export https_proxy="$${HTTPS_PROXY:-}"
        export no_proxy="$${NO_PROXY:-localhost,127.0.0.1}"
        export VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
        export VLLM_WORKER_MULTIPROC_METHOD=spawn
        export VLLM_OFFLOAD_WEIGHTS_BEFORE_QUANT=0

        if ! command -v vllm-router >/dev/null 2>&1; then
          echo "[vllm] installing vllm-router $$VLLM_ROUTER_VERSION"
          pip install --quiet --no-cache-dir "vllm-router==$$VLLM_ROUTER_VERSION"
        fi

        wait_for_backend() {
          name="$1"
          port="$2"
          timeout_s="$$VLLM_BACKEND_READY_TIMEOUT_SECONDS"
          deadline=$$((SECONDS + timeout_s))
          delay=5
          max_delay=30
          echo "[vllm] waiting for $$name on :$$port (timeout $${timeout_s}s)"
          while true; do
            if curl -fsS -H "Authorization: Bearer $$VLLM_API_KEY" "http://127.0.0.1:$$port/v1/models" >/dev/null 2>&1; then
              echo "[vllm] $$name ready"
              return 0
            fi
            if [ "$$SECONDS" -ge "$$deadline" ]; then
              echo "[vllm] timed out waiting for $$name after $${timeout_s}s" >&2
              return 1
            fi
            echo "[vllm] $$name not ready yet; retrying in $${delay}s"
            sleep "$$delay"
            if [ "$$delay" -lt "$$max_delay" ]; then
              delay=$$((delay * 2))
              if [ "$$delay" -gt "$$max_delay" ]; then
                delay="$$max_delay"
              fi
            fi
          done
        }

        # Serial startup: bring embedding fully up before launching chat so the
        # two models do not load at the same time and contend for GPU 0 memory.
        echo "[vllm] starting embedding on :18104 (background)"
        (
          export ZE_AFFINITY_MASK=0
          exec vllm serve /llm/models/KaLM-embedding-v2.5 \
            --served-model-name KaLM-embedding-v2.5 \
            --runner pooling --convert embed \
            --port 18104 --host 0.0.0.0 \
            --gpu-memory-util 0.15 \
            --trust-remote-code --disable-log-requests \
            --api-key $${VLLM_API_KEY:?VLLM_API_KEY must be set} \
            --dtype float16 --enforce-eager \
            > >(tee -a /llm/logs/vllm-embed.log | sed 's/^/[vllm-embed] /') 2>&1
        ) &

        wait_for_backend embed 18104 || echo "[vllm] embed not ready; starting chat anyway"

        echo "[vllm] starting chat on :18103 (background)"
        (
          export ZE_AFFINITY_MASK=0,1,2,3
          exec vllm serve /llm/models/Qwen3-Coder-Next \
            --served-model-name Qwen3-Coder-Next \
            --port 18103 --host 0.0.0.0 \
            --tensor-parallel-size 4 \
            --quantization fp8 \
            --gpu-memory-util 0.85 \
            --max-num-batched-tokens 8192 \
            --max-model-len 262144 \
            --block-size 64 \
            --dtype float16 \
            --api-key $${VLLM_API_KEY:?VLLM_API_KEY must be set} \
            --tool-call-parser qwen3_coder \
            --default-chat-template-kwargs '{"enable_thinking": false}' \
            --enforce-eager \
            --trust-remote-code \
            --disable-log-requests \
            --enable-prefix-caching \
            --enable-auto-tool-choice \
            > >(tee -a /llm/logs/vllm-chat.log | sed 's/^/[vllm-chat] /') 2>&1
        ) &

        (
          wait_for_backend chat 18103
          wait_for_backend embed 18104

          echo "[vllm] waiting for router on :$$ROUTER_PORT"
          for i in $(seq 1 60); do
            curl -fsS -H "Authorization: Bearer $$VLLM_API_KEY" \
              "http://127.0.0.1:$$ROUTER_PORT/v1/models" >/dev/null 2>&1 && break
            sleep 1
          done

          echo "[vllm] registering chat backend"
          curl -fsS -X POST -H "Authorization: Bearer $$VLLM_API_KEY" \
            -H 'Content-Type: application/json' \
            "http://127.0.0.1:$$ROUTER_PORT/workers" \
            -d '{"url":"http://127.0.0.1:18103","model_id":"Qwen3-Coder-Next"}' \
            | sed 's/^/[init] /' || true
          echo

          echo "[vllm] registering embed backend"
          curl -fsS -X POST -H "Authorization: Bearer $$VLLM_API_KEY" \
            -H 'Content-Type: application/json' \
            "http://127.0.0.1:$$ROUTER_PORT/workers" \
            -d '{"url":"http://127.0.0.1:18104","model_id":"KaLM-embedding-v2.5"}' \
            | sed 's/^/[init] /' || true
          echo
        ) &

        echo "[vllm] starting vllm-router on :$$ROUTER_PORT (foreground, enable-igw)"

        # Watchdog: periodically verify generation sanity and self-exit on
        # repeated failure so restart:unless-stopped can restart the container
        # Controllable via SUPERCLAW_WATCHDOG_* env vars
        if [ "$${SUPERCLAW_WATCHDOG_ENABLED:-true}" = "true" ]; then
          (
            set -o pipefail
            interval=$${SUPERCLAW_WATCHDOG_INTERVAL_S:-60}
            max_fails=$${SUPERCLAW_WATCHDOG_FAILURES:-3}
            expected=$${SUPERCLAW_WATCHDOG_CANARY_EXPECTED:-Hello}
            _wd_max_restarts=$${SUPERCLAW_WATCHDOG_MAX_RESTARTS:-5}
            _wd_window_s=$$(( $${SUPERCLAW_WATCHDOG_RESTART_WINDOW_MINUTES:-60} * 60 ))
            fails=0

            # On startup: check if the restart budget is already exhausted (or expired).
            if [ "$$_wd_max_restarts" -gt 0 ] && [ -f /llm/logs/.watchdog_state ]; then
              _wd_attempts=$$(python3 -c "import json; d=json.load(open('/llm/logs/.watchdog_state')); print(d.get('attempts',0))" 2>/dev/null || echo 0)
              # Only apply the stability window when restarts have actually occurred.
              # Skipping when attempts=0 avoids a spurious "window elapsed" log on
              # every clean first boot (the pre-created file has no last_attempt_ts).
              if [ "$$_wd_attempts" -gt 0 ]; then
                _wd_last_ts=$$(python3 -c "import json; d=json.load(open('/llm/logs/.watchdog_state')); print(d.get('last_attempt_ts',0))" 2>/dev/null || echo 0)
                _wd_elapsed=$$(( $$(date +%s) - _wd_last_ts ))
                if [ "$$_wd_elapsed" -ge "$$_wd_window_s" ]; then
                  echo "[watchdog] restart window elapsed ($${_wd_elapsed}s >= $${_wd_window_s}s) — resetting counter (was $$_wd_attempts/$$_wd_max_restarts)" >&2
                  python3 -c "import json; json.dump({'attempts': 0}, open('/llm/logs/.watchdog_state', 'w'))" 2>/dev/null || true
                  _wd_attempts=0
                fi
              fi
              if [ "$$_wd_attempts" -ge "$$_wd_max_restarts" ]; then
                echo "[watchdog] MAX RESTARTS REACHED ($$_wd_attempts/$$_wd_max_restarts) — entering monitoring-only mode (no auto-kill). Run 'superclaw-ctl up' to reset." >&2
                exit 0
              fi
            fi

            echo "[watchdog] waiting for Qwen3-Coder-Next to appear in router /v1/models"
            while true; do
              if curl -sf --max-time 10 \
                   -H "Authorization: Bearer $$VLLM_API_KEY" \
                   "http://127.0.0.1:$$ROUTER_PORT/v1/models" 2>/dev/null \
                 | grep -q "Qwen3-Coder-Next"; then
                echo "[watchdog] Qwen3-Coder-Next registered — starting canary loop (interval=$${interval}s, max_fails=$$max_fails, max_restarts=$$_wd_max_restarts)"
                break
              fi
              sleep 10
            done

            while true; do
              sleep "$$interval"
              if ! RESP=$$(curl -sf --max-time 10 \
                    -H "Authorization: Bearer $$VLLM_API_KEY" \
                    -H 'Content-Type: application/json' \
                    "http://127.0.0.1:$$ROUTER_PORT/v1/chat/completions" \
                    -d '{"model":"Qwen3-Coder-Next","messages":[{"role":"user","content":"hi"}],"max_tokens":1,"temperature":0}' \
                    2>/dev/null); then
                echo "[watchdog] canary curl failed — counting as failure" >&2
                fails=$$((fails + 1))
                if [ "$$fails" -ge "$$max_fails" ]; then
                  echo "[watchdog] consecutive failure limit reached - triggering restart" >&2
                  python3 -c "import json,time,os; f='/llm/logs/.watchdog_state'; d=(json.load(open(f)) if os.path.exists(f) else {}); d['attempts']=d.get('attempts',0)+1; d['last_attempt_ts']=int(time.time()); json.dump(d,open(f,'w'))" 2>/dev/null || true
                  kill 1
                fi
                continue
              fi
              CONTENT=$$(printf '%s' "$$RESP" | \
                python3 -c "import sys,json; d=json.load(sys.stdin); print(d['choices'][0]['message']['content'].strip())" \
                2>/dev/null || true)
              if [ "$$CONTENT" = "$$expected" ]; then
                fails=0
                # Stability window: reset the restart counter once the model has been
                # continuously healthy since the last restart for longer than the window.
                # Guard on _wd_attempts > 0 to avoid spurious resets on a clean boot
                # where the pre-created state file has attempts=0 and no last_attempt_ts.
                if [ "$$_wd_max_restarts" -gt 0 ] && [ -f /llm/logs/.watchdog_state ]; then
                  _wd_chk_attempts=$$(python3 -c "import json; d=json.load(open('/llm/logs/.watchdog_state')); print(d.get('attempts',0))" 2>/dev/null || echo 0)
                  if [ "$$_wd_chk_attempts" -gt 0 ]; then
                    _wd_last_ts=$$(python3 -c "import json; d=json.load(open('/llm/logs/.watchdog_state')); print(d.get('last_attempt_ts',0))" 2>/dev/null || echo 0)
                    if [ $$(( $$(date +%s) - _wd_last_ts )) -ge "$$_wd_window_s" ]; then
                      echo "[watchdog] stability window passed — resetting restart counter (was $$_wd_chk_attempts/$$_wd_max_restarts)" >&2
                      python3 -c "import json; json.dump({'attempts': 0}, open('/llm/logs/.watchdog_state', 'w'))" 2>/dev/null || true
                    fi
                  fi
                fi
              else
                fails=$$((fails + 1))
                echo "[watchdog] canary fail $$fails/$$max_fails: got '$$CONTENT', expected '$$expected'" >&2
                if [ "$$fails" -ge "$$max_fails" ]; then
                  echo "[watchdog] consecutive failure limit reached — triggering restart" >&2
                  python3 -c "import json,time,os; f='/llm/logs/.watchdog_state'; d=(json.load(open(f)) if os.path.exists(f) else {}); d['attempts']=d.get('attempts',0)+1; d['last_attempt_ts']=int(time.time()); json.dump(d,open(f,'w'))" 2>/dev/null || true
                  kill 1
                fi
              fi
            done
          ) &
        fi

        exec vllm-router \
          --host "$$ROUTER_HOST" --port "$$ROUTER_PORT" \
          --enable-igw --policy round_robin \
          --api-key "$${VLLM_API_KEY}" \
          > >(tee -a /llm/logs/router.log | sed 's/^/[router] /') 2>&1
    healthcheck:
      # Two-stage probe
      # Stage 1 - liveness: both models registered in /v1/models
      # Stage 2 - generation sanity: POST /v1/chat/completions and assert expected first token
      #   Runs when:
      #   (a) watchdog is disabled (SUPERCLAW_WATCHDOG_ENABLED != "true"), OR
      #   (b) watchdog is dormant (max restarts reached) — avoids a gap where the
      #       container reports healthy while generation remains broken and the
      #       watchdog has stopped auto-restarting.
      test:
        - CMD-SHELL
        - |
          curl -sf -H "Authorization: Bearer $${VLLM_API_KEY:?VLLM_API_KEY must be set}" \
            "http://127.0.0.1:$${ROUTER_PORT:-8080}/v1/models" \
            | grep -q Qwen3-Coder-Next \
          && curl -sf -H "Authorization: Bearer $${VLLM_API_KEY:?VLLM_API_KEY must be set}" \
            "http://127.0.0.1:$${ROUTER_PORT:-8080}/v1/models" \
            | grep -q KaLM-embedding-v2.5 \
          || exit 1
          _hc_run_canary=false
          if [ "$${SUPERCLAW_WATCHDOG_ENABLED:-true}" != "true" ]; then
            _hc_run_canary=true
          elif [ -f /llm/logs/.watchdog_state ]; then
            _hc_max=$${SUPERCLAW_WATCHDOG_MAX_RESTARTS:-5}
            if [ "$$_hc_max" -gt 0 ]; then
              _hc_attempts=$$(python3 -c "import json; d=json.load(open('/llm/logs/.watchdog_state')); print(d.get('attempts',0))" 2>/dev/null || echo 0)
              if [ "$$_hc_attempts" -ge "$$_hc_max" ]; then
                _hc_run_canary=true
              fi
            fi
          fi
          if [ "$$_hc_run_canary" = "true" ]; then
            RESP=$$(curl -sf --max-time 10 \
              -H "Authorization: Bearer $${VLLM_API_KEY:?VLLM_API_KEY must be set}" \
              -H 'Content-Type: application/json' \
              "http://127.0.0.1:$${ROUTER_PORT:-8080}/v1/chat/completions" \
              -d '{"model":"Qwen3-Coder-Next","messages":[{"role":"user","content":"hi"}],"max_tokens":1,"temperature":0}') || exit 1
            CONTENT=$$(printf '%s' "$$RESP" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print(d['choices'][0]['message']['content'].strip())" 2>/dev/null) || exit 1
            [ "$$CONTENT" = "$${SUPERCLAW_WATCHDOG_CANARY_EXPECTED:-Hello}" ]
          fi
      interval: 30s
      timeout: 20s
      retries: 120
      start_period: 300s
    restart: unless-stopped
